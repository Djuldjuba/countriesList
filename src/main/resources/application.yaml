spring:
  application:
    name: countriesList
  datasource:
    url: jdbc:postgresql://localhost:5432/countrydb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    generate-ddl: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8083